  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    text-align: center;

  }
  header h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 4px; }
  header p  { font-size: 0.95rem; opacity: 0.85; }

  /* ─── Controls ─── */
  .controls {
    background: white;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  #searchInput {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border: 2px solid #cbd5e0;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: #2d6a9f; }

  .results-count {
    display: flex;
    align-items: center;
    font-size: 0.85rem;
    color: #718096;
    white-space: nowrap;
  }
  #count { font-weight: 700; color: #2d6a9f; margin: 0 4px; }

  /* Filter sections */
  .filter-section { margin-bottom: 10px; }
  .filter-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: #4a5568;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 2px solid transparent;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.18s;
    background: #edf2f7;
    color: #4a5568;
  }
  .filter-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
  .filter-btn.active {
    color: white;
    border-color: transparent;
  }

  /* SEN colours */
  .sen-btn.active  { background: #744210; }
  .sen-ASD.active  { background: #2c7a7b; }
  .sen-SLI.active  { background: #553c9a; }
  .sen-SpLD.active { background: #b7791f; }
  .sen-ADHD.active { background: #c05621; }
  .sen-MI.active   { background: #276749; }

  /* Grade colours */
  .grade-btn.active { background: #2b6cb0; }

  /* Tier colours */
  .tier-btn.active  { background: #c53030; }

  .clear-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 2px solid #e2e8f0;
    font-size: 0.82rem;
    cursor: pointer;
    background: white;
    color: #718096;
    font-weight: 600;
    transition: all 0.18s;
  }
  .clear-btn:hover { background: #fed7d7; border-color: #fc8181; color: #c53030; }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ─── Card ─── */
  .card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.13);
  }
  .card.hidden { display: none; }

  /* Card header strip */
  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #e2e8f0;
    position: relative;
  }
  .card-number {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #2d6a9f;
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a202c;
    padding-right: 36px;
    line-height: 1.3;
  }

  /* Tag pills */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .tag {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.02em;

  .tag-sen  { background: #ebf4ff; color: #2b6cb0; }
  .tag-grade{ background: #f0fff4; color: #276749; }
  .tag-tier { background: #fff5f5; color: #c53030; }
  .tag-lang { background: #faf5ff; color: #553c9a; }
  .tag-cost { background: #fffaf0; color: #b7791f; }

  /* Card body */
  .card-body { padding: 14px 16px; flex: 1; }
  .desc {
    font-size: 0.87rem;
    color: #4a5568;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .desc.expanded { -webkit-line-clamp: unset; }
  .expand-btn {
    background: none;
    border: none;
    color: #2d6a9f;
    font-size: 0.8rem;
    cursor: pointer;
    padding: 4px 0;
    font-weight: 600;
  }
  .expand-btn:hover { text-decoration: underline; }

  /* Card footer */
  .card-footer {
    padding: 10px 16px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .footer-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8rem;
    color: #2d6a9f;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s;
  }
  .footer-link:hover { color: #1a4f7a; text-decoration: underline; }
  .footer-link svg { flex-shrink: 0; }

  /* No results */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: #718096;
    font-size: 1rem;
  }
  .no-results svg { margin-bottom: 12px; opacity: 0.4; }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; padding: 12px; gap: 14px; }
    header h1 { font-size: 1.3rem; }
  }
</style>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let filters = { sen: 'all', grade: 'all', tier: 'all' };
let searchTerm = '';

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  tools.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = t.id;
    card.dataset.sen = t.sen.join(',');
    card.dataset.grade = t.grade.join(',');
    card.dataset.tier = t.tier.join(',');

    // Tags
    const senTags  = t.sen.map(s => `<span class="tag tag-sen">${s}</span>`).join('');
    const gradeTags = [...new Set(t.grade.map(g => {
      if (g === '幼兒') return '幼兒';
      if (g === '小學') return '小學';
      if (g === '中學') return '中/高中';
      return g;
    }))].map(g => `<span class="tag tag-grade">${g}</span>`).join('');
    const tierTags = t.tier.map(tr => `<span class="tag tag-tier">${tr}</span>`).join('');
    const costTag  = `<span class="tag tag-cost">${t.costLabel}</span>`;
    const langTag  = `<span class="tag tag-lang">${t.lang}</span>`;

    // Footer links
    let footerLinks = '';
    if (t.website) {
      footerLinks += `<a class="footer-link" href="${t.website}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        ${t.websiteLabel || '官方網站'}
      </a>`;
    }
    if (t.websiteExtra) {
      footerLinks += `<a class="footer-link" href="${t.websiteExtra}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        ${t.websiteExtraLabel || '網站'}
      </a>`;
    }
    if (t.youtube) {
      footerLinks += `<a class="footer-link" href="https://www.youtube.com/watch?v=${t.youtube}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        YouTube 示範
      </a>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="card-number">${t.id}</div>
        <div class="card-title">${t.name}${t.subname ? `<br><span style="font-size:0.8em;font-weight:500;color:#718096">${t.subname}</span>` : ''}</div>
        <div class="tags">${senTags}${gradeTags}${tierTags}${langTag}${costTag}</div>
      </div>
      <div class="card-body">
        <p class="desc" id="desc-${t.id}">${t.desc}</p>
        <button class="expand-btn" onclick="toggleDesc(${t.id}, this)">▼ 顯示更多</button>
      </div>
      ${footerLinks ? `<div class="card-footer">${footerLinks}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function toggleDesc(id, btn) {
  const desc = document.getElementById('desc-' + id);
  if (desc.classList.contains('expanded')) {
    desc.classList.remove('expanded');
    btn.textContent = '▼ 顯示更多';
  } else {
    desc.classList.add('expanded');
    btn.textContent = '▲ 收起';
  }
}

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
function setFilter(type, value, btn) {
  filters[type] = value;

  const group = btn.parentElement.querySelectorAll('.filter-btn');
  group.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  applyFilters();
}

function applyFilters() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  let visible = 0;

  document.querySelectorAll('.card').forEach(card => {
    const id = parseInt(card.dataset.id);
    const t = tools.find(x => x.id === id);

    let show = true;

    if (filters.sen !== 'all') {
      show = show && t.sen.includes(filters.sen);
    }
    if (filters.grade !== 'all') {
      show = show && t.grade.includes(filters.grade);
    }
    if (filters.tier !== 'all') {
      show = show && t.tier.includes(filters.tier);
    }
    if (searchTerm) {
      const searchable = (t.name + ' ' + (t.subname||'') + ' ' + t.desc + ' ' + t.sen.join(' ')).toLowerCase();
      show = show && searchable.includes(searchTerm);
    }

    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  document.getElementById('count').textContent = visible;

  let noRes = document.getElementById('noResults');
  if (visible === 0) {
    if (!noRes) {
      noRes = document.createElement('div');
      noRes.id = 'noResults';
      noRes.className = 'no-results';
      noRes.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" display="block" style="margin:0 auto 12px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>沒有符合條件的工具<br><small>請嘗試調整篩選條件</small></p>`;
      document.getElementById('cardGrid').appendChild(noRes);
    }
    noRes.style.display = 'block';
  } else if (noRes) {
    noRes.style.display = 'none';
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildCards();
applyFilters();
</script>
